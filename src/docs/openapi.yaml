  /api/reviews:
    post:
      tags:
        - Review

      summary: Create a review

      description: |
        Creates a review for a rented gear item.

        **Authorization Required**

        Only authenticated customers can create reviews.

        The customer is automatically identified from the HTTP-only authentication cookie.

        **Rules**

        - A review can only be created for a rental order that belongs to the authenticated customer.
        - The rental order must have been returned.
        - One review is allowed per customer for each rented gear item.

      operationId: createReview

      security:
        - cookieAuth: []

      requestBody:
        required: true

        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateReviewRequest'

      responses:
        '201':
          description: Review created successfully.

          content:
            application/json:
              schema:
                type: object

                properties:
                  success:
                    type: boolean
                    example: true

                  statusCode:
                    type: integer
                    example: 201

                  message:
                    type: string
                    example: Review created successfully.

                  data:
                    allOf:
                      - $ref: '#/components/schemas/Review'

                      - type: object

                        properties:
                          customer:
                            $ref: '#/components/schemas/CustomerSummary'

                          gearItem:
                            $ref: '#/components/schemas/GearReviewCreateSummary'
                            

        '400':
          description: Invalid request or review already exists.

          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

        '401':
          description: Unauthorized.

          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

        '403':
          description: Forbidden. Only customers can create reviews.

          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

        '404':
          description: Rental order or gear item not found.

          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  
    get:
      tags:
        - Review

      summary: Get all reviews

      description: |
        Retrieves all gear reviews with pagination, filtering, sorting,
        customer information, and review statistics.

      operationId: getAllReviews

      parameters:
        - name: page
          in: query
          schema:
            type: integer
            default: 1

        - name: limit
          in: query
          schema:
            type: integer
            default: 10

        - name: rating
          in: query
          description: Filter by rating.
          schema:
            type: integer
            minimum: 1
            maximum: 5

        - name: sortBy
          in: query
          schema:
            type: string
            enum:
              - rating
              - createdAt
            default: createdAt

        - name: sortOrder
          in: query
          schema:
            type: string
            enum:
              - asc
              - desc
            default: desc

      responses:
        '200':
          description: Reviews retrieved successfully.

          content:
            application/json:
              schema:
                type: object

                properties:
                  success:
                    type: boolean
                    example: true

                  statusCode:
                    type: integer
                    example: 200

                  message:
                    type: string
                    example: Reviews retrieved successfully.

                  meta:
                    type: object

                    properties:
                      page:
                        type: integer
                        example: 1

                      limit:
                        type: integer
                        example: 10

                      total:
                        type: integer
                        example: 1

                      totalPage:
                        type: integer
                        example: 1

                      hasNext:
                        type: boolean
                        example: false

                      hasPrev:
                        type: boolean
                        example: false

                  data:
                    type: object

                    properties:
                      statistics:
                        type: object

                        properties:
                          averageRating:
                            type: number
                            format: float
                            example: 4

                          totalReviews:
                            type: integer
                            example: 1

                      reviews:
                        type: array

                        items:
                          allOf:
                            - $ref: '#/components/schemas/Review'

                            - type: object

                              properties:
                                customer:
                                  $ref: '#/components/schemas/CustomerSummary'

                                gearItem:
                                  $ref: '#/components/schemas/GearReviewSummary'

        '500':
          description: Internal server error.

