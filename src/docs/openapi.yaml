                                  properties:
                                    gearItem:
                                      $ref: "#/components/schemas/Gear"

  /api/rentals/{rentalId}/return:
    patch:
      tags:
        - Rental
      summary: Mark Rental as Returned
      description: |
        Marks a picked-up rental order as returned.

        **Authorization Required**

        Only authenticated providers can mark rental orders as returned.

        The provider is automatically identified from the HTTP-only authentication cookie.

        This endpoint can only be used after the rental order has been marked as **PICKED_UP**.

        Returning a rental automatically updates the gear stock and makes the rented gear available for future rentals.
      operationId: markRentalAsReturned
      security:
        - cookieAuth: []
      parameters:
        - name: rentalId
          in: path
          required: true
          description: Rental order ID.
          schema:
            type: string
            example: "cmrfzzm0k00001ggb8yu51ouh"
      responses:
        "200":
          description: Rental returned successfully.
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: true
                  statusCode:
                    type: integer
                    example: 200
                  message:
                    type: string
                    example: "Rental returned successfully."
                  data:
                    allOf:
                      - $ref: "#/components/schemas/Rental"
                      - type: object
                        properties:
                          customer:
                            $ref: "#/components/schemas/CustomerSummaryRental"
                          payment:
                            type: object
                            properties:
                              id:
                                type: string
                                format: uuid
                              amount:
                                type: number
                                format: float
                              status:
                                type: string
                                enum:
                                  - PENDING
                                  - COMPLETED
                                  - FAILED
                              paidAt:
                                type: string
                                format: date-time
                                nullable: true
                          items:
                            type: array
                            items:
                              allOf:
                                - $ref: "#/components/schemas/RentalItem"
                                - type: object
                                  properties:
                                    gearItem:
                                      $ref: "#/components/schemas/Gear"

  /api/payments/checkout-session/{rentalId}:
    post:
      tags:
        - Payment
      summary: Create Stripe Checkout Session
      description: |
        Creates a Stripe Checkout Session for a rental order.

        **Authorization Required**

        Only the authenticated customer who owns the rental order can create a checkout session.

        Returns a Stripe-hosted checkout URL where the customer can securely complete the payment.
      operationId: createCheckoutSession
      security:
        - cookieAuth: []
      parameters:
        - name: rentalId
          in: path
          required: true
          description: Rental order ID.
          schema:
            type: string
            example: "cmrfzzm0k00001ggb8yu51ouh"
      responses:
        "200":
          description: Checkout session created successfully.
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: true
                  statusCode:
                    type: integer
                    example: 200
                  message:
                    type: string
                    example: "Checkout session created successfully."
                  data:
                    type: object
                    properties:
                      checkoutUrl:
                        type: string
                        format: uri
                        example: "https://checkout.stripe.com/c/pay/cs_test_xxxxxxxxxxxxxxxxxxxxxxxxx"
                      sessionId:
                        type: string
                        example: "cs_test_xxxxxxxxxxxxxxxxxxxxxxxxx"

