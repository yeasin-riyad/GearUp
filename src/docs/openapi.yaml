        **Authorization Required**

        Only authenticated customers can create rental orders.

        The customer is automatically identified from the HTTP-only authentication cookie.

        **Next Step**

        After successfully creating a rental order, the customer should call the **Create Stripe Checkout Session** endpoint to generate a Stripe Checkout URL and complete the payment securely.

        Endpoint:
        `POST /api/payments/checkout-session/{rentalId}`
      operationId: createRental
      security:
        - cookieAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateRentalRequest"
            example:
              startDate: "2026-07-11"
              endDate: "2026-07-14"
              items:
                - gearItemId: "6325e342-7a02-4307-a49d-b2c73cd37aeb"
                  quantity: 1
                - gearItemId: "e3044fc1-f39d-4cad-88ca-1326aa6345a3"
                  quantity: 1
      responses:
        "201":
          description: Rental order created successfully.
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: true
                  statusCode:
                    type: integer
                    example: 201
                  message:
                    type: string
                    example: "Rental order created successfully."
                  data:
                    $ref: "#/components/schemas/Rental"

  /api/rentals/{rentalId}/cancel:
    patch:
      tags:
        - Rental
      summary: Cancel Rental Order
      description: |
        Cancels a rental order before payment.

        **Authorization Required**

        Only authenticated customers can cancel their own rental orders.

        Providers and administrators are not allowed to cancel customer rental orders.

        The customer is automatically identified from the HTTP-only authentication cookie.

        Only rental orders with **PLACED** status can be cancelled.
      operationId: cancelRentalOrder
      security:
        - cookieAuth: []
      parameters:
        - name: rentalId
          in: path
          required: true
          description: Rental order ID.
          schema:
            type: string
            example: "cmrgarh2400001gewj4phq3jz"
      responses:
        "200":
          description: Rental cancelled successfully.
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: true
                  statusCode:
                    type: integer
                    example: 200
                  message:
                    type: string
                    example: "Rental cancelled successfully."
                  data:
                    allOf:
                      - $ref: "#/components/schemas/Rental"
                      - type: object
                        properties:
                          customer:
                            $ref: "#/components/schemas/CustomerSummary"
                          payment:
                            type: object
                            nullable: true
                          items:
                            type: array
                            items:
                              allOf:
                                - $ref: "#/components/schemas/RentalItem"
                                - type: object
                                  properties:
                                    gearItem:
                                      $ref: "#/components/schemas/Gear"
        "400":
          description: Rental cannot be cancelled.
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: false
                  statusCode:
                    type: integer
                    example: 400
                  message:
                    type: string
                    example: "Only placed rental orders can be cancelled."
                  error:
                    type: object
                    properties:
                      name:
                        type: string
                        example: "AppError"

