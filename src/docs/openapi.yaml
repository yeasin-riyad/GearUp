          content:
            application/json:
              schema:
                type: object

                properties:
                  success:
                    type: boolean
                    example: true

                  statusCode:
                    type: integer
                    example: 200

                  message:
                    type: string
                    example: Review deleted successfully.

                  data:
                    type: "null"
                    nullable: true
                    example: null

        '401':
          description: Unauthorized.

          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

        '403':
          description: Forbidden. Customer does not own this review.

          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

        '404':
