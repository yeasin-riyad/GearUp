                            type: object
                            properties:
                              id:
                                type: string
                                format: uuid
                                example: "3eb0a70b-5b45-47b4-9b6f-bbbacf7d1bf6"
                              name:
                                type: string
                                example: "Outdoor Gear BD"
                              email:
                                type: string
                                format: email
                                example: "provider@example.com"

    get:
      tags:
        - Gear
      summary: Get all gears
      description: |
        Retrieves a paginated list of rental gears.

        Supports searching, filtering, sorting, and pagination.
      operationId: getAllGears
      parameters:
        - name: page
          in: query
          required: false
          description: Page number.
          schema:
            type: integer
            default: 1
            minimum: 1
        - name: limit
          in: query
          required: false
          description: Number of items per page.
          schema:
            type: integer
            default: 10
            minimum: 1
        - name: search
          in: query
          required: false
          description: Search by gear name or brand.
          schema:
            type: string
        - name: sortBy
          in: query
          required: false
          description: Field to sort by.
          schema:
            type: string
            enum:
              - createdAt
              - updatedAt
              - name
              - pricePerDay
              - stock
        - name: sortOrder
          in: query
          required: false
          description: Sort order.
          schema:
            type: string
            enum:
              - asc
              - desc
            default: desc
        - name: categoryId
          in: query
          required: false
          description: Filter by category ID.
          schema:
            type: string
            format: uuid
        - name: providerId
          in: query
          required: false
          description: Filter by provider ID.
          schema:
            type: string
            format: uuid
        - name: availability
          in: query
          required: false
          description: Filter by gear availability.
          schema:
            type: string
            enum:
              - AVAILABLE
              - UNAVAILABLE
        - name: minPrice
          in: query
          required: false
          description: Minimum rental price per day.
          schema:
            type: number
            format: float
        - name: maxPrice
          in: query
          required: false
          description: Maximum rental price per day.
          schema:
            type: number
            format: float
        - name: brand
          in: query
          required: false
          description: Filter by brand.
          schema:
            type: string
      responses:
        "200":
          description: Gears retrieved successfully.
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: true
                  statusCode:
                    type: integer
                    example: 200
                  message:
                    type: string
                    example: "Gears retrieved successfully."
                  meta:
                    type: object
                    properties:
