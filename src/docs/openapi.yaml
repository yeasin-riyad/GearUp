      operationId: createGear
      security:
        - cookieAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateGearRequest"
            example:
              name: "Camping Tent 4 Person"
              description: "Waterproof camping tent suitable for four people."
              brand: "NatureHike"
              image: "https://example.com/images/tent.jpg"
              pricePerDay: 35
              stock: 8
              categoryId: "f86f497f-3eeb-433b-98ce-437b51056fb1"
      responses:
        "201":
          description: Gear created successfully.
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: true
                  statusCode:
                    type: integer
                    example: 201
                  message:
                    type: string
                    example: "Gear created successfully."
                  data:
                    allOf:
                      - $ref: "#/components/schemas/Gear"
                      - type: object
                        properties:
                          category:
                            $ref: "#/components/schemas/Category"
