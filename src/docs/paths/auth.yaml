paths:

  /api/auth/register:

    post:
      tags:
        - Authentication

      summary: Register a new user

      description: Creates a new customer or provider account.

      requestBody:
        required: true

        content:
          application/json:
            schema:
              type: object

              required:
                - name
                - email
                - password
                - role

              properties:

                name:
                  type: string
                  example: John Doe

                email:
                  type: string
                  example: john@example.com

                password:
                  type: string
                  example: Password@123

                role:
                  type: string
                  enum:
                    - CUSTOMER
                    - PROVIDER

      responses:

        "201":
          description: User registered successfully.

        "400":
          description: Validation failed.

        "409":
          description: Email already exists.

  /api/auth/login:

    post:
      tags:
        - Authentication

      summary: Login user

      description: Login using email and password.

      requestBody:
        required: true

        content:
          application/json:
            schema:

              type: object

              required:
                - email
                - password

              properties:

                email:
                  type: string
                  example: admin@example.com

                password:
                  type: string
                  example: Password@123

      responses:

        "200":
          description: Login successful.

        "401":
          description: Invalid credentials.

  /api/auth/refresh-token:

    post:
      tags:
        - Authentication

      summary: Refresh access token

      description: Generate a new access token using refresh token.

      security:
        - bearerAuth: []

      responses:

        "200":
          description: New access token generated.

        "401":
          description: Invalid refresh token.

  /api/auth/change-password:

    patch:
      tags:
        - Authentication

      summary: Change password

      security:
        - bearerAuth: []

      requestBody:
        required: true

        content:
          application/json:

            schema:

              type: object

              required:
                - oldPassword
                - newPassword

              properties:

                oldPassword:
                  type: string
                  example: Password@123

                newPassword:
                  type: string
                  example: NewPassword@123

      responses:

        "200":
          description: Password changed successfully.

        "400":
          description: Invalid request.

        "401":
          description: Unauthorized.

  /api/auth/profile:

    get:
      tags:
        - Authentication

      summary: Get logged-in user profile

      security:
        - bearerAuth: []

      responses:

        "200":
          description: User profile returned.

        "401":
          description: Unauthorized.